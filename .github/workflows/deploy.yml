name: CI & Deploy to Dreamhost

# Tests run on every push/PR. Deploy only happens after tests pass on `main`.
# Can also be run manually from the Actions tab to verify the connection.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP lint (syntax check all tracked PHP)
        run: |
          THEMES=wordpress/app/public/wp-content/themes
          if [ -d "$THEMES" ]; then
            find "$THEMES" -name '*.php' -print0 | xargs -0 -r -I{} php -l "{}"
          else
            echo "No theme files yet — nothing to lint."
          fi

  deploy:
    name: Deploy to production
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Proves DH_SFTP_KEY + HOST + USER + REMOTE_PATH all work, independent of
      # whether there are any files to deploy yet. This is the "is it good?" check.
      - name: Verify SSH connectivity to Dreamhost
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DH_SFTP_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p 22 \
            "${{ secrets.DH_SFTP_USER }}@${{ secrets.DH_SFTP_HOST }}" \
            "echo \"Connected as \$(whoami) on \$(hostname)\"; \
             echo 'Remote path listing:'; \
             ls -ld '${{ secrets.DH_REMOTE_PATH }}'"

      - name: Check for a theme to deploy
        id: check
        run: |
          THEMES=wordpress/app/public/wp-content/themes
          if [ -d "$THEMES" ] && [ -n "$(ls -A "$THEMES" 2>/dev/null)" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "No theme committed yet — connectivity verified, skipping file sync."
          fi

      # Native rsync over SSH, reusing the key written above. Avoids the
      # third-party action's key-handling quirks (error in libcrypto).
      #
      # TODO(deploy-hardening): after 3 successful deploys to production,
      # add `--delete` below so files removed from the repo are also removed
      # on the server. Left off initially so a first sync can't delete data.
      - name: Deploy wp-content/themes over rsync/SSH
        if: steps.check.outputs.deploy == 'true'
        run: |
          rsync -az --itemize-changes \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p 22" \
            wordpress/app/public/wp-content/themes/ \
            "${{ secrets.DH_SFTP_USER }}@${{ secrets.DH_SFTP_HOST }}:${{ secrets.DH_REMOTE_PATH }}/themes/"

      # Ship all tracked, secret-free mu-plugins (the checkout only contains the
      # nqa-*.php files; the 0-nqa-runtime-config.php secret is injected separately
      # below and is preserved on the server since we never use --delete).
      - name: Deploy tracked mu-plugins over rsync/SSH
        if: steps.check.outputs.deploy == 'true'
        run: |
          SSH='ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p 22'
          $SSH "${{ secrets.DH_SFTP_USER }}@${{ secrets.DH_SFTP_HOST }}" \
            "mkdir -p '${{ secrets.DH_REMOTE_PATH }}/mu-plugins'"
          rsync -az --itemize-changes -e "$SSH" \
            wordpress/app/public/wp-content/mu-plugins/ \
            "${{ secrets.DH_SFTP_USER }}@${{ secrets.DH_SFTP_HOST }}:${{ secrets.DH_REMOTE_PATH }}/mu-plugins/"

      # Generate the runtime-secrets mu-plugin from a GitHub Secret and ship it.
      # The key value is never in git and is masked in logs. Skipped (with a
      # warning) if the secret isn't set yet, so deploys don't hard-fail.
      - name: Inject runtime secrets (Google Maps key) on production
        if: steps.check.outputs.deploy == 'true'
        env:
          MAPS_KEY: ${{ secrets.NQA_GOOGLE_MAPS_KEY }}
        run: |
          if [ -z "$MAPS_KEY" ]; then
            echo "::warning::NQA_GOOGLE_MAPS_KEY secret not set — skipping key injection."
            exit 0
          fi
          umask 077
          printf '<?php\nif ( ! defined( "NQA_GOOGLE_MAPS_KEY" ) ) {\n\tdefine( "NQA_GOOGLE_MAPS_KEY", %s );\n}\n' \
            "'$MAPS_KEY'" > 0-nqa-runtime-config.php
          SSH='ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -p 22'
          rsync -az -e "$SSH" \
            0-nqa-runtime-config.php \
            "${{ secrets.DH_SFTP_USER }}@${{ secrets.DH_SFTP_HOST }}:${{ secrets.DH_REMOTE_PATH }}/mu-plugins/0-nqa-runtime-config.php"
          rm -f 0-nqa-runtime-config.php
          echo "Runtime secrets injected."
